<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta name="description" content="IronForge Gym Management System – Securely manage memberships, trainers, and fitness goals." />
    <meta name="theme-color" content="#f97316" />
    <meta name="robots" content="noindex, nofollow" /> <!-- Private app -->

    <!-- Security: CSP as meta fallback (headers take precedence) -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />

    <!-- Prevent clickjacking via meta (belt-and-suspenders) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Referrer policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- No caching for the app shell (dynamic content) -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>IronForge Gym Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
